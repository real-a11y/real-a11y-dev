name: A11y Tree Diff

# Dogfood: audit our OWN docs site with `real-a11y snapshot` on both the base
# branch and the PR, then `real-a11y diff` the two artifacts and post a single
# sticky comment. Findings-aware (a new/changed/fixed violation, not a raw line
# diff) plus an advisory structural view diff — so an engine change that
# reshapes the tree of a real page still shows up.
#
# This exercises the shipped CLI end-to-end (multi-page snapshot + diff) against
# real content, not just fixtures. The committed baselines in `website-a11y`
# stay the hard gate; this is the reviewer-facing "did our code move a11y?"
# signal. The comment is updated in place on every push, never spammed.

on:
  pull_request:
    branches: [main]
    # Only run when OUR code that can change the a11y tree changes — an engine
    # or CLI change is exactly what we want to see reflected on real pages. Pure
    # docs edits are covered by the `website-a11y` gate, not here.
    paths:
      - "packages/core/src/**"
      - "packages/serialize/src/**"
      - "packages/testing/src/**"
      - "packages/cli/src/**"
      - ".github/workflows/a11y-diff.yml"

permissions:
  contents: read
  pull-requests: write # post/update the sticky comment

# One run per PR ref — a quick second push cancels the first so two jobs can't
# race the find-or-create comment.
concurrency:
  group: a11y-diff-${{ github.ref }}
  cancel-in-progress: true

env:
  # The pages audited on BOTH sides. `name` is the diff's join key, so it must
  # match across base/PR — which it does, since this list drives both jobs. The
  # port must match the `vitepress preview --port` below.
  A11Y_PAGES: >-
    [{"name":"Home","url":"http://localhost:4173/"},
    {"name":"A11y Snapshots","url":"http://localhost:4173/guide/accessibility-snapshots"},
    {"name":"core","url":"http://localhost:4173/packages/core"},
    {"name":"inspector","url":"http://localhost:4173/packages/inspector"},
    {"name":"react","url":"http://localhost:4173/packages/react"},
    {"name":"storybook-addon","url":"http://localhost:4173/packages/storybook-addon"},
    {"name":"testing","url":"http://localhost:4173/packages/testing"},
    {"name":"mcp","url":"http://localhost:4173/packages/mcp"},
    {"name":"cli","url":"http://localhost:4173/packages/cli"}]

jobs:
  # ── Snapshot the BASE branch with the BASE engine (so an engine/CLI change in
  #    the PR shows as drift on real pages, not just content edits) ────────────
  snapshot-base:
    name: Snapshot (base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Build website
        run: pnpm --filter @real-a11y-dev/website build

      - name: Install Playwright browser
        run: pnpm --filter @real-a11y-dev/cli exec playwright install chromium --with-deps

      # Serve the built site, wait for it, snapshot every page, then let the
      # backgrounded server die with the step. A11Y_PAGES points at :4173.
      - name: Snapshot base
        run: |
          pnpm --filter @real-a11y-dev/website exec vitepress preview --port 4173 &
          for i in $(seq 1 60); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 1; done
          node packages/cli/dist/index.js snapshot --wait-until networkidle --settle 1000 -o base.json

      - uses: actions/upload-artifact@v4
        with:
          name: base-snapshot
          path: base.json
          if-no-files-found: error

  # ── Snapshot the PR with the PR engine, diff against base, comment ──────────
  audit-pr:
    name: Audit PR & comment
    needs: [snapshot-base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Build website
        run: pnpm --filter @real-a11y-dev/website build

      - name: Install Playwright browser
        run: pnpm --filter @real-a11y-dev/cli exec playwright install chromium --with-deps

      - name: Snapshot PR
        run: |
          pnpm --filter @real-a11y-dev/website exec vitepress preview --port 4173 &
          for i in $(seq 1 60); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 1; done
          node packages/cli/dist/index.js snapshot --wait-until networkidle --settle 1000 -o pr.json

      - uses: actions/download-artifact@v4
        with:
          name: base-snapshot

      # Findings-aware diff. `--fail-on never` keeps it advisory — this is a
      # reviewer signal, not a second gate on top of `website-a11y`. Human (md) +
      # machine (json: findings + structural views).
      - name: Diff snapshots
        run: |
          node packages/cli/dist/index.js diff base.json pr.json --format md --fail-on never -o diff.md
          node packages/cli/dist/index.js diff base.json pr.json --format json --fail-on never -o diff.json

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const MARKER = '<!-- real-a11y-diff -->';
            const FOOTER =
              '_Powered by [Real A11y](https://real-a11y.dev) — `real-a11y diff`_';

            const md = fs.readFileSync('diff.md', 'utf8').trim();
            const result = JSON.parse(fs.readFileSync('diff.json', 'utf8'));
            const s = result.summary;
            const findingChanges = s.new + s.changed + s.removed;

            // Advisory structural drift, with the ACTUAL lines, collapsed per
            // page. Drop the "Last updated" footer timestamp: it renders
            // differently between the base and PR checkouts (shallow clone), so
            // it would otherwise show a phantom +1/-1 on every unchanged page.
            const VOLATILE = /^\s*time "/;
            const CAP = 25;
            const clean = (arr) => (arr ?? []).filter((l) => !VOLATILE.test(l));

            const structBlocks = [];
            for (const page of result.pages) {
              const views = ['tree', 'outline', 'tabs']
                .map((name) => {
                  const v = page.views?.[name] ?? {};
                  return { name, added: clean(v.added), removed: clean(v.removed) };
                })
                .filter((v) => v.added.length || v.removed.length);
              if (!views.length) continue;

              const summary = views
                .map((v) => `${v.name} +${v.added.length}/-${v.removed.length}`)
                .join(' · ');
              const diffs = views
                .map((v) => {
                  const shown = [
                    ...v.removed.slice(0, CAP).map((l) => `- ${l}`),
                    ...v.added.slice(0, CAP).map((l) => `+ ${l}`),
                  ];
                  const hidden = v.added.length + v.removed.length - shown.length;
                  const more = hidden > 0 ? `\n… ${hidden} more line(s)` : '';
                  return '**' + v.name + '**\n```diff\n' + shown.join('\n') + more + '\n```';
                })
                .join('\n\n');
              structBlocks.push(
                `<details>\n<summary><b>${page.name}</b> — ${summary}</summary>\n\n${diffs}\n\n</details>`,
              );
            }

            const anyChange = findingChanges > 0 || structBlocks.length > 0;

            let body;
            if (!anyChange) {
              body = [
                MARKER,
                '## ✅ A11y unchanged',
                '',
                'No accessibility findings or tree structure changed in this PR.',
                '',
                FOOTER,
              ].join('\n');
            } else {
              const parts = [MARKER, md, ''];
              if (structBlocks.length) {
                parts.push(
                  '#### Structural changes (advisory)',
                  '',
                  'The semantic tree / outline / tab order moved — review to confirm the change is intentional. Expand a page for the exact lines.',
                  '',
                  ...structBlocks,
                  '',
                );
              }
              parts.push(FOOTER);
              body = parts.join('\n');
              // GitHub caps a comment at 65 536 chars.
              if (body.length > 60_000) {
                body = body.slice(0, 60_000) + '\n\n_…truncated — see the job log for the full diff._';
              }
            }

            // Sticky comment: match on the marker as the FIRST line AND our own
            // bot author. `includes()` is hijackable — an accessible name quoting
            // the marker inside any comment would collide; `startsWith` + author
            // can't.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const mine = comments.find(
              (c) =>
                c.user?.login === 'github-actions[bot]' &&
                c.body?.startsWith(MARKER),
            );

            if (mine) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: mine.id,
                body,
              });
              console.log('Updated a11y-diff comment', mine.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Posted new a11y-diff comment');
            }
