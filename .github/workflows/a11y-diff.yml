name: A11y Tree Diff

# Dogfood: audit the repo's own fixtures with `real-a11y snapshot` on both the
# base branch and the PR, then `real-a11y diff` the two artifacts and post a
# single sticky comment. Findings-aware (a new/changed/fixed violation, not a
# raw line diff) plus an advisory structural view diff — so an engine change
# that reshapes the tree still shows up.
#
# The comment is updated in place on every push, never spammed.

on:
  pull_request:
    branches: [main]
    # Only run when something that can change the a11y tree changes.
    paths:
      - "packages/core/src/**"
      - "packages/serialize/src/**"
      - "packages/testing/src/**"
      - "packages/testing/e2e/fixture*.html"
      - ".github/workflows/a11y-diff.yml"

permissions:
  contents: read
  pull-requests: write # post/update the sticky comment

# One run per PR ref — a quick second push cancels the first so two jobs can't
# race the find-or-create comment.
concurrency:
  group: a11y-diff-${{ github.ref }}
  cancel-in-progress: true

env:
  # The pages audited on BOTH sides. `name` is the diff's join key, so it must
  # match across base/PR — which it does, since this list drives both jobs.
  # Relative paths resolve (and are gated behind --allow-file) against the repo
  # root, where the snapshot command runs.
  A11Y_PAGES: '[{"name":"fixture (well-structured)","url":"packages/testing/e2e/fixture.html"},{"name":"fixture-bad (broken)","url":"packages/testing/e2e/fixture-bad.html"}]'

jobs:
  # ── Snapshot the BASE branch with the BASE engine (so an engine change in the
  #    PR shows as drift, not just fixture edits) ─────────────────────────────
  snapshot-base:
    name: Snapshot (base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Install Playwright browser
        run: pnpm --filter @real-a11y-dev/cli exec playwright install chromium --with-deps

      - name: Snapshot base
        run: node packages/cli/dist/index.js snapshot --allow-file -o base.json

      - uses: actions/upload-artifact@v4
        with:
          name: base-snapshot
          path: base.json
          if-no-files-found: error

  # ── Snapshot the PR with the PR engine, diff against base, comment ──────────
  audit-pr:
    name: Audit PR & comment
    needs: [snapshot-base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Install Playwright browser
        run: pnpm --filter @real-a11y-dev/cli exec playwright install chromium --with-deps

      - name: Snapshot PR
        run: node packages/cli/dist/index.js snapshot --allow-file -o pr.json

      - uses: actions/download-artifact@v4
        with:
          name: base-snapshot

      # Findings-aware diff. `--fail-on never` keeps it advisory — the fixtures
      # include an intentionally-broken page, so "new findings" isn't a build
      # failure here. Human (md) + machine (json: findings + structural views).
      - name: Diff snapshots
        run: |
          node packages/cli/dist/index.js diff base.json pr.json --format md --fail-on never -o diff.md
          node packages/cli/dist/index.js diff base.json pr.json --format json --fail-on never -o diff.json

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const MARKER = '<!-- real-a11y-diff -->';
            const FOOTER =
              '_Powered by [Real A11y](https://real-a11y.dev) — `real-a11y diff`_';

            const md = fs.readFileSync('diff.md', 'utf8').trim();
            const result = JSON.parse(fs.readFileSync('diff.json', 'utf8'));
            const s = result.summary;
            const findingChanges = s.new + s.changed + s.removed;

            // Advisory structural drift: which views gained/lost lines per page.
            const structRows = [];
            for (const page of result.pages) {
              const bits = [];
              for (const view of ['tree', 'outline', 'tabs']) {
                const v = page.views?.[view] ?? { added: [], removed: [] };
                if (v.added.length || v.removed.length) {
                  bits.push(`${view} +${v.added.length}/-${v.removed.length}`);
                }
              }
              if (bits.length) structRows.push(`- **${page.name}** — ${bits.join(', ')}`);
            }

            const anyChange = findingChanges > 0 || structRows.length > 0;

            let body;
            if (!anyChange) {
              body = [
                MARKER,
                '## ✅ A11y unchanged',
                '',
                'No accessibility findings or tree structure changed in this PR.',
                '',
                FOOTER,
              ].join('\n');
            } else {
              const parts = [MARKER, md, ''];
              if (structRows.length) {
                parts.push('#### Structural changes (advisory)', '', ...structRows, '');
              }
              parts.push(FOOTER);
              body = parts.join('\n');
              // GitHub caps a comment at 65 536 chars.
              if (body.length > 60_000) {
                body = body.slice(0, 60_000) + '\n\n_…truncated — see the job log for the full diff._';
              }
            }

            // Sticky comment: match on the marker as the FIRST line AND our own
            // bot author. `includes()` is hijackable — an accessible name quoting
            // the marker inside any comment would collide; `startsWith` + author
            // can't.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const mine = comments.find(
              (c) =>
                c.user?.login === 'github-actions[bot]' &&
                c.body?.startsWith(MARKER),
            );

            if (mine) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: mine.id,
                body,
              });
              console.log('Updated a11y-diff comment', mine.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Posted new a11y-diff comment');
            }
