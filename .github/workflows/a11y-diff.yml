name: A11y Tree Diff

# Dogfood: audit our OWN docs site with `real-a11y snapshot` on both the base
# branch and the PR, then `real-a11y diff` the two artifacts and post a single
# sticky comment. Findings-aware (a new/changed/fixed violation, not a raw line
# diff) plus an advisory structural view diff — so an engine change that
# reshapes the tree of a real page still shows up.
#
# This exercises the shipped CLI end-to-end (multi-page snapshot + diff) against
# real content, not just fixtures. The committed baselines in `website-a11y`
# stay the hard gate; this is the reviewer-facing "did our code move a11y?"
# signal. The comment is updated in place on every push, never spammed.

on:
  pull_request:
    branches: [main]
    # Only run when OUR code that can change the a11y tree changes — an engine
    # or CLI change is exactly what we want to see reflected on real pages. Pure
    # docs edits are covered by the `website-a11y` gate, not here.
    paths:
      - "packages/core/src/**"
      - "packages/serialize/src/**"
      - "packages/testing/src/**"
      - "packages/cli/src/**"
      - ".github/workflows/a11y-diff.yml"

permissions:
  contents: read
  pull-requests: write # post/update the sticky comment
  actions: read # read the jobs API to deep-link the full-diff step log

# One run per PR ref — a quick second push cancels the first so two jobs can't
# race the find-or-create comment.
concurrency:
  group: a11y-diff-${{ github.ref }}
  cancel-in-progress: true

# The audited routes live in one place — `.github/a11y-ci.config.json` — which
# drives the base + PR snapshots here (and the scan in `a11y-semantic-scan.yml`).
# Its port must match the `vitepress preview --port` below.

jobs:
  # ── Snapshot the BASE branch with the BASE engine (so an engine/CLI change in
  #    the PR shows as drift on real pages, not just content edits) ────────────
  snapshot-base:
    name: Snapshot (base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Build website
        run: pnpm --filter @real-a11y-dev/website build

      - name: Install Playwright browser
        run: pnpm --filter @real-a11y-dev/cli exec playwright install chromium --with-deps

      # base_ref may predate the route config, so overlay the PR's copy (via the
      # always-available refs/pull/<n>/head — works for forks too) so both sides
      # audit the SAME routes. This is what the old PR-defined A11Y_PAGES env did
      # implicitly.
      - name: Overlay the PR's a11y route config
        run: |
          git fetch --no-tags --depth=1 origin "refs/pull/${{ github.event.pull_request.number }}/head"
          git checkout FETCH_HEAD -- .github/a11y-ci.config.json

      # Serve the built site, wait for it, snapshot every route from the config,
      # then let the backgrounded server die with the step.
      - name: Snapshot base
        run: |
          pnpm --filter @real-a11y-dev/website exec vitepress preview --port 4173 &
          for i in $(seq 1 60); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 1; done
          node packages/cli/dist/index.js snapshot --config .github/a11y-ci.config.json --wait-until networkidle --settle 1000 -o base.json

      - uses: actions/upload-artifact@v4
        with:
          name: base-snapshot
          path: base.json
          if-no-files-found: error

  # ── Snapshot the PR with the PR engine, diff against base, comment ──────────
  audit-pr:
    name: Audit PR & comment
    needs: [snapshot-base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Build website
        run: pnpm --filter @real-a11y-dev/website build

      - name: Install Playwright browser
        run: pnpm --filter @real-a11y-dev/cli exec playwright install chromium --with-deps

      # Serve the built site, wait for it, snapshot every route from the config,
      # then let the backgrounded server die with the step. (Code-scanning SARIF
      # for the Security tab is a separate workflow — `a11y-semantic-scan.yml` —
      # that analyzes the default branch, which is what the Security tab shows.)
      - name: Snapshot PR
        run: |
          pnpm --filter @real-a11y-dev/website exec vitepress preview --port 4173 &
          for i in $(seq 1 60); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 1; done
          node packages/cli/dist/index.js snapshot --config .github/a11y-ci.config.json --wait-until networkidle --settle 1000 -o pr.json

      - uses: actions/download-artifact@v4
        with:
          name: base-snapshot

      # The FULL diff to stdout — captured in this job's log, uncapped, so the
      # complete structural diff is always one click away even when the comment
      # is truncated. `--ignore-view-line '^time "'` drops the VitePress "Last
      # updated" timestamp (differs between the base/PR shallow checkouts).
      - name: Structural diff (full — expand for the complete diff)
        run: node packages/cli/dist/index.js diff base.json pr.json --explain --fail-on never --ignore-view-line '^time "'

      # The comment build. `--explain` adds the plain-language summary (opt-in;
      # the bare CLI stays neutral). `--max-pages 5 --max-lines 20` keep the
      # sticky comment scannable — the first 5 changed routes, 20 diff lines
      # each; the rest are listed and point to the full diff in the job log.
      - name: Diff snapshots (comment)
        run: |
          node packages/cli/dist/index.js diff base.json pr.json --format md --explain --fail-on never --ignore-view-line '^time "' --max-pages 5 --max-lines 20 -o diff.md
          node packages/cli/dist/index.js diff base.json pr.json --format json --fail-on never --ignore-view-line '^time "' -o diff.json

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const MARKER = '<!-- real-a11y-diff -->';

            // Deep-link "the full structural diff" to the exact job step that
            // prints it uncapped — not just the run summary. Resolve the job +
            // step by the step's NAME via the jobs API (so the `#step:N:1`
            // anchor follows the step even if earlier steps are reordered), and
            // fall back to the run URL if the lookup fails (API hiccup / rename).
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const FULL_DIFF_STEP = 'Structural diff (full — expand for the complete diff)';
            let fullDiffUrl = runUrl;
            try {
              const { data } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });
              const job = data.jobs.find((j) =>
                j.steps?.some((st) => st.name === FULL_DIFF_STEP),
              );
              const step = job?.steps?.find((st) => st.name === FULL_DIFF_STEP);
              if (job && step) fullDiffUrl = `${job.html_url}#step:${step.number}:1`;
            } catch (err) {
              console.log('full-diff step link lookup failed, using run URL:', err.message);
            }
            const FOOTER =
              `[See the full structural diff](${fullDiffUrl}) · ` +
              '_Powered by [Real A11y](https://real-a11y.dev) — `real-a11y diff`_';

            const md = fs.readFileSync('diff.md', 'utf8').trim();
            const result = JSON.parse(fs.readFileSync('diff.json', 'utf8'));
            const s = result.summary;
            const findingChanges = s.new + s.changed + s.removed;

            // `structuralDiff` (per page) is TRUE whenever the unified diff has
            // any hunk — the honest "structure changed" signal. It's a superset
            // of `structural` (plain-language statements), which misses a pure
            // TREE reorder; keying anyChange on it stops the bot posting a
            // false "unchanged" while diff.md actually shows a change. The
            // `?? []`/`||` fallbacks keep it working against an older CLI.
            const anyDrift = result.pages.some(
              (p) => (p.structural ?? []).length > 0 || p.structuralDiff,
            );
            const anyChange = findingChanges > 0 || anyDrift;

            let body;
            if (!anyChange) {
              body = [
                MARKER,
                '## ✅ A11y unchanged',
                '',
                'No accessibility findings or tree structure changed in this PR.',
                '',
                FOOTER,
              ].join('\n');
            } else {
              body = [MARKER, md, '', FOOTER].join('\n');
              // GitHub caps a comment at 65 536 chars.
              if (body.length > 60_000) {
                body = body.slice(0, 60_000) + '\n\n_…truncated — see the job log for the full diff._';
              }
            }

            // Sticky comment: match on the marker as the FIRST line AND our own
            // bot author. `includes()` is hijackable — an accessible name quoting
            // the marker inside any comment would collide; `startsWith` + author
            // can't.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const mine = comments.find(
              (c) =>
                c.user?.login === 'github-actions[bot]' &&
                c.body?.startsWith(MARKER),
            );

            if (mine) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: mine.id,
                body,
              });
              console.log('Updated a11y-diff comment', mine.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Posted new a11y-diff comment');
            }
