name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Locked down per CodeQL Actions/missing-workflow-permissions. Both jobs
# only check out code and run npm packages; neither needs write access
# anywhere.
permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Primary correctness gate: build + typecheck + format + lint + tests +
  # the testing example's audit snapshots + the runnable npm-side examples.
  # Matrixed across Node 20 (the dev default + engines floor) and 22, on Linux
  # + macOS so we catch path/EOL surprises early. Windows is intentionally
  # skipped — the contributor base is Linux/macOS, the extension only ships
  # through Chrome, and CI cost grows fast on a 3x3.
  # Node 24 is NOT here because this job builds the docs site, and VitePress 1.6
  # throws ERR_REQUIRE_CYCLE_MODULE on Node's newer require(esm) cycle rule —
  # present in current 24.x AND the newest 22.x (fixed only in alpha VitePress
  # 2.0). CI's `22` still resolves to an older, working 22.x; if that ever
  # advances past the break, drop 22 here. The docs build itself needs Node 20.
  # The libraries are Node-24 clean and covered by `packages-node24` below.
  verify:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # pnpm version is read from `packageManager` in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Single gate: build → typecheck → format:check → lint → test.
      # Mirrors the local `pre-push` hook so "passes locally" guarantees
      # "passes CI" — and any check we add to `pnpm verify` automatically
      # extends CI without touching this workflow.
      - name: Verify
        run: pnpm verify

      # The testing example has its own audit tests; include them in CI so
      # snapshot drift is caught here, not only manually.
      - name: Test examples
        run: pnpm --filter @real-a11y-dev/example-testing test

      # Confirm the website and runnable examples still build end-to-end,
      # including the Storybook example (audit #5 — previously skipped).
      - name: Build examples and docs
        run: |
          pnpm --filter @real-a11y-dev/example-vanilla build
          pnpm --filter @real-a11y-dev/example-react build
          pnpm --filter @real-a11y-dev/example-storybook build-storybook
          pnpm --filter @real-a11y-dev/website build

      # Bundle-size budget gate. `pnpm verify` already built the public
      # packages, so size-limit operates on fresh dist/ output. Budgets
      # live in .size-limit.json — tighten as the libraries shrink.
      - name: Size limit
        run: pnpm size-limit

      # publint + attw — checks the published exports map, types
      # resolution from CJS/ESM consumers, and the dual-package hazard.
      # Surfaces packaging mistakes that aren't visible in the source.
      - name: Packaging checks
        run: pnpm packaging:check

  # Playwright e2e for @real-a11y-dev/testing's `attach()` API and the
  # @real-a11y-dev/mcp server (both drive a real browser). Single OS + Node
  # combo — the e2e suites test our adapters, not Node/OS portability, and the
  # `test` matrix already covers those for the libraries themselves.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter='./packages/*' build

      - name: Install Playwright browsers
        run: pnpm --filter @real-a11y-dev/testing exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm --filter @real-a11y-dev/testing test:e2e

      # MCP server e2e — reuses the Chromium installed above (shared
      # ms-playwright cache); drives a real browser through the MCP tools.
      - name: Run MCP e2e tests
        run: pnpm --filter @real-a11y-dev/mcp test:e2e

      # CLI e2e — spawns the built `real-a11y` bin against data: URLs;
      # reuses the same Chromium install.
      - name: Run CLI e2e tests
        run: pnpm --filter @real-a11y-dev/cli test:e2e

      # DOM↔native parity harness (RFC PR E). Non-blocking FIRST: it logs the
      # overlap watermark and fails only below a conservative floor, but does
      # not gate merges while the corpus + native normalizer stabilize. Drop
      # `continue-on-error` to make parity a required gate once the corpus has
      # grown (iframes, portals, virtualized lists) and the floor is tightened.
      - name: Run native-vs-DOM parity harness (advisory)
        continue-on-error: true
        run: pnpm --filter @real-a11y-dev/browser test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: packages/testing/playwright-report/
          retention-days: 7

  # Vite dev-server smoke test: starts each example's `vite` dev server
  # and probes it for resolver errors. Catches "Failed to resolve entry
  # for package …" bugs that production `vite build` and publint/attw
  # don't reproduce — those use different resolution paths than the dev
  # server's import-analysis pipeline.
  #
  # Includes Windows because pnpm symlinks behave differently there
  # (NTFS junctions vs symlinks) and the resolver bug that motivated
  # this job was Windows-only. The job is cheap (<60s per OS), so it
  # earns its keep without expanding the heavy `verify` matrix.
  examples-dev:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter='./packages/*' build

      # CLI unit tests on both OSes — the CLI's path/URL normalization and
      # exit-code discipline are exactly the class of behavior only a
      # Windows runner catches (pathToFileURL, drive-letter "schemes").
      # Browserless, so it costs seconds.
      - name: Run CLI unit tests
        run: pnpm --filter @real-a11y-dev/cli test

      # Spawn the built bin browser-free — exit-code and stdout-drain
      # discipline on Windows only shows up in a real spawned process.
      # `&&`, not a multi-line block: pwsh only propagates the LAST command's
      # exit code, which would mask a failing --version.
      - name: Smoke-test CLI bin (browser-free)
        run: node packages/cli/dist/index.js --version && node packages/cli/dist/index.js --help

      - name: Smoke-test example dev servers
        run: pnpm examples:dev-smoke

  # Per-route accessibility gate for the deployed docs site. Runs axe
  # (per route × theme) and three structural snapshots per route — full
  # a11y tree, heading outline, and tab sequence — against the built
  # website served by `vitepress preview`. Snapshot baselines live in
  # website/tests/a11y.spec.ts-snapshots/; drift fails the test, and
  # intentional changes are accepted via `--update-snapshots` locally.
  website-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The spec imports `@real-a11y-dev/testing/playwright`, which
      # resolves through the package's `exports` field to its dist/.
      - name: Build workspace packages
        run: pnpm -r --filter='./packages/*' build

      - name: Build website
        run: pnpm --filter @real-a11y-dev/website build

      - name: Install Playwright browser
        run: pnpm --filter @real-a11y-dev/website exec playwright install chromium --with-deps

      - name: Run axe + a11y snapshot suite
        run: pnpm --filter @real-a11y-dev/website test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: website-playwright-report
          path: website/playwright-report/
          retention-days: 7

  # Node 24 (current Active LTS) coverage for the LIBRARIES only. The `verify`
  # matrix stops at 22 because it builds the docs site, which VitePress can't do
  # on Node 24 yet (see that job's note). The packages themselves are Node-24
  # clean, so exercise them here: the root `build`/`typecheck`/`test` scripts
  # already exclude the website + examples, so this is a pure library lane. When
  # VitePress 2 ships stable and the docs build on 24, fold 24 into `verify` and
  # delete this job.
  packages-node24:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build, typecheck, and test the libraries on Node 24
        run: |
          pnpm build
          pnpm typecheck
          pnpm test

  # Require a changeset whenever a *published* package's source changes, so a
  # release's changelog and version bump never silently go missing. We check
  # the PR's own diff rather than `changeset status`: the packages are `linked`
  # in .changeset/config.json, so any pending changeset already sitting in
  # .changeset/ makes `status` pass even when THIS PR added none.
  changeset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require a changeset for published-package changes
        if: github.event_name == 'pull_request'
        env:
          BASE: origin/${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only "$BASE"...HEAD)
          # Published packages only — extension and example-patterns are
          # private; test-only edits need no changelog entry.
          src=$(echo "$changed" \
            | grep -E '^packages/(core|serialize|ui|inspector|react|storybook-addon|testing|validate|mcp|cli)/src/' \
            | grep -vE '\.(test|spec)\.[tj]sx?$' || true)
          added=$(git diff --name-only --diff-filter=A "$BASE"...HEAD -- .changeset \
            | grep -E '\.md$' | grep -viE 'README' || true)
          if [ -n "$src" ] && [ -z "$added" ]; then
            echo "::error::This PR changes a published package but adds no changeset. Run 'pnpm changeset' (or 'pnpm changeset --empty' if no release is needed) and commit the .changeset/*.md file."
            echo "Changed published-package source:"
            echo "$src"
            exit 1
          fi
          echo "Changeset check OK."

  # Aggregating gate that branch protection can require under a single name.
  # Without it, switching the matrix on/off requires a settings change for
  # every required-check entry. `test` becomes the stable contract; the
  # underlying matrix can grow or shrink freely.
  test:
    if: always()
    runs-on: ubuntu-latest
    needs: [verify, packages-node24, e2e, examples-dev, website-a11y, changeset]
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.verify.result }}" != "success" ] || [ "${{ needs.packages-node24.result }}" != "success" ] || [ "${{ needs.e2e.result }}" != "success" ] || [ "${{ needs.examples-dev.result }}" != "success" ] || [ "${{ needs.website-a11y.result }}" != "success" ] || [ "${{ needs.changeset.result }}" != "success" ]; then
            echo "verify=${{ needs.verify.result }} packages-node24=${{ needs.packages-node24.result }} e2e=${{ needs.e2e.result }} examples-dev=${{ needs.examples-dev.result }} website-a11y=${{ needs.website-a11y.result }} changeset=${{ needs.changeset.result }}"
            exit 1
          fi
