name: Extension release

# Builds the Chrome extension and packages it for the Web Store on every
# push of an `extension-v*` tag (e.g. `extension-v0.1.3`). The CWS upload
# itself is still manual — see docs/maintainers/publishing.md — but the
# zip and the GitHub Release are automated, removing the easiest step to
# get wrong (zipping the wrong dist/, forgetting the version suffix, etc.).

on:
  push:
    tags:
      - "extension-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to use for the GitHub Release (defaults to the resolved manifest version)"
        required: false

permissions:
  contents: read

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      # Need write to attach the zip to a GitHub Release.
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags so the release-notes script can diff against the
          # previous extension-v* tag.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The extension consumes @real-a11y-dev/core + ui as workspace deps
      # via vite. Their dist/ has to exist before the extension's vite
      # build can resolve the imports — `^...` selects the extension's
      # upstream deps without running the extension's own build.
      - name: Build workspace dependencies
        run: pnpm --filter "@real-a11y-dev/semantic-navigator-extension^..." build

      # The zip below is produced by `vite`, which does not type-check, and the
      # extension's unit tests never run here — so a type error or a failing
      # test could ship straight to the Chrome Web Store. Gate the release on
      # the extension plus the packages it bundles (core, ui, serialize); the
      # `^...` build above already produced their dist/.
      - name: Typecheck the extension and its bundled deps
        run: pnpm --filter "@real-a11y-dev/semantic-navigator-extension..." typecheck

      - name: Test the extension and its bundled deps
        run: pnpm --filter "@real-a11y-dev/semantic-navigator-extension..." test

      # Builds the extension itself and runs scripts/zip-for-cws.mjs.
      - name: Build + zip
        run: pnpm --filter @real-a11y-dev/semantic-navigator-extension package

      # Resolve the version once and reuse: the manifest is the source
      # of truth (synced from package.json by `prebuild`), and the zip
      # name follows the same pattern.
      - name: Resolve version + zip path
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/extension/public/manifest.json').version")
          ZIP="packages/extension/semantic-navigator-v${VERSION}.zip"
          if [ ! -f "$ZIP" ]; then
            echo "::error::Expected zip not found at $ZIP — did the package step succeed?"
            ls -la packages/extension/
            exit 1
          fi
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP"            >> "$GITHUB_OUTPUT"
          echo "size=$(stat -c %s "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: semantic-navigator-v${{ steps.meta.outputs.version }}
          path: ${{ steps.meta.outputs.zip }}
          retention-days: 90

      # Generate the "What's new" body from conventional commits touching the
      # extension's bundled surface since the previous extension-v* tag. Writes
      # release-notes.md, which the release step below uses as its body. It's a
      # draft — the maintainer reviews it and polishes the Web Store copy by
      # hand. See scripts/extension-release-notes.mjs.
      - name: Generate release notes
        run: |
          node scripts/extension-release-notes.mjs \
            --version "${{ steps.meta.outputs.version }}" \
            --zip "semantic-navigator-v${{ steps.meta.outputs.version }}.zip" \
            --size "${{ steps.meta.outputs.size }}" \
            > release-notes.md
          echo "----- generated release notes -----"
          cat release-notes.md

      # Create or update a GitHub Release with the zip attached so the
      # maintainer can download it without re-running the workflow.
      # Tag-triggered runs use the pushed tag; workflow_dispatch falls
      # back to `extension-v<manifest-version>`.
      - name: Create GitHub Release
        if: github.event_name == 'push' || inputs.tag_name != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: ${{ inputs.tag_name || github.ref_name }}
          draft: true
          prerelease: ${{ contains(steps.meta.outputs.version, '-') }}
          files: ${{ steps.meta.outputs.zip }}
          body_path: release-notes.md
