name: Publish to npm

# Triggered manually or by pushing a version tag (e.g. `v0.1.1-beta.0`).
# Publishes every public workspace package with npm provenance.
#
# Auth: NPM_TOKEN (granular automation token) for the publish itself,
# OIDC for the provenance attestation.
#
# Trusted Publisher (npm OIDC for the publish auth path) is configured on
# every @real-a11y-dev/* package and works for the provenance signing
# step, but pnpm 9.x + Node 20's npm 10.x don't fully wire OIDC into the
# `PUT /<pkg>` publish call yet — they fall through to the .npmrc
# `_authToken` (which `actions/setup-node` reads from `NODE_AUTH_TOKEN`).
# Without the token the publish 404s after provenance succeeds. Once
# pnpm 10.x + npm 11.5+ are on the runner we can drop NODE_AUTH_TOKEN
# again and rely purely on Trusted Publisher.
#
# Trusted Publisher binding to keep in place per package:
#   npmjs.com/package/@real-a11y-dev/<name>/access
#   → Publishing access → GitHub Actions → Add Trusted Publisher
#     - Organization or user: real-a11y
#     - Repository:           real-a11y-dev
#     - Workflow filename:    publish.yml
#     - Environment name:     (blank)
#
# Provenance attestations land in the public Sigstore transparency log
# regardless of the publish-auth path and show as a verified badge on
# the package page.

on:
  workflow_dispatch:
    inputs:
      tag:
        # Leave blank to derive from the version (prerelease → `beta`, otherwise
        # → `latest`). Set it only to force a channel. Default is intentionally
        # empty, not `beta`: `release-tag.yml` dispatches without this input, so
        # a `beta` default would publish a stable graduation under `beta`.
        description: "npm dist-tag to publish under — blank = derive from version"
        required: false
        default: ""
      sha:
        # release-tag.yml passes the release PR's merge commit so the publish
        # runs against exactly what was merged, even if another PR raced onto
        # main in between. Blank falls back to the triggering ref (a pushed `v*`
        # tag, or main for a bare manual run).
        description: "Commit SHA to publish — blank = the triggering ref"
        required: false
        default: ""
  # Manual break-glass: pushing a `v*` tag by hand still publishes. The
  # automation uses per-package tags + an explicit dispatch instead, so this
  # path is only for recovering a release by hand.
  push:
    tags:
      - "v*"

# Default to read-only for any token derived from this workflow. The
# publish job below escalates to `id-token: write` for npm OIDC and keeps
# `contents: read` — least-privilege per OpenSSF Scorecard's
# Token-Permissions check.
permissions: read-all

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for OIDC: lets npm validate the GitHub Actions identity
      # against each package's Trusted Publisher config, and lets npm
      # publish attach a provenance attestation.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # A dispatched `sha` pins the exact merge commit; otherwise check out
          # the triggering ref (the pushed `v*` tag, or main for a manual run).
          ref: ${{ github.event.inputs.sha || github.ref }}

      # pnpm version is read from `packageManager` in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      # Root `build` (the same one CI and the pre-push hook run) builds every
      # publishable package; it shares its workspace filter with `typecheck`
      # and `test` below, so the gate can never trip over an unbuilt package.
      - name: Build all packages
        run: pnpm build

      # A version tag can be pushed from any commit, and the build above is
      # `tsup`/`vite` — it transpiles without type-checking and never runs the
      # test suites. So a type error or a failing test in the tagged commit
      # would publish to npm silently. Re-run the two gates a build can't catch
      # on the exact release commit, before anything is published. (format:check
      # and lint are already enforced on `main` by the required `test` check, so
      # repeating them here would only add cost and failure surface.)
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # `release-tag.yml` always dispatches with an explicit tag. A tag-push run
      # carries no input, so derive one from the version rather than assuming
      # `beta`: a stable `0.1.0` has to publish under `latest` itself, because
      # advance-latest.mjs deliberately no-ops once pre-mode has exited. Without
      # this, graduating to stable would ship under `beta` and leave `latest`
      # pinned to the last prerelease.
      - name: Resolve dist-tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            VERSION="$(node -p "require('./packages/core/package.json').version")"
            case "$VERSION" in
              *-*) TAG="beta" ;;
              *)   TAG="latest" ;;
            esac
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      # pnpm's `publish -r` publishes every package whose version/tag is new,
      # skips the rest. `--no-git-checks` lets tag-triggered runs proceed even
      # when the working tree does not match main exactly.
      #
      # NODE_AUTH_TOKEN feeds the .npmrc `_authToken=${NODE_AUTH_TOKEN}` line
      # that `actions/setup-node` writes; pnpm reads it from there for the
      # `PUT /<pkg>` call. NPM_CONFIG_PROVENANCE keeps provenance attestation
      # signing on (uses GHA OIDC under the hood — independent of the
      # publish-auth path).
      - name: Publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm publish -r \
            --access public \
            --tag ${{ steps.tag.outputs.value }} \
            --no-git-checks

      # After a prerelease publish, advance `latest` to the just-published
      # versions. `--tag beta` never moves `latest`, so pre-1.0 `npm install
      # <pkg>` would keep resolving an old version and the npm page would
      # headline a stale one. The script self-guards: it no-ops when the publish
      # already targeted `latest`, and when the repo is past changesets
      # prerelease mode — so it can never regress a stable `latest` to a beta.
      - name: Advance latest dist-tag (prerelease only)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/advance-latest.mjs --published-tag ${{ steps.tag.outputs.value }}
