name: Publish to npm

# Triggered manually or by pushing a version tag (e.g. `v0.1.1-beta.0`).
# Publishes every public workspace package with npm provenance.
#
# Auth: Trusted Publisher (npm OIDC).
# Each `@real-a11y-dev/*` package has GitHub Actions configured as a trusted
# publisher pointing at this workflow. npm validates the OIDC token issued
# by GitHub on every publish — no NPM_TOKEN, no OTP, no security key tap.
#
# Configure once per package at:
#   npmjs.com/package/@real-a11y-dev/<name>/access
#   → Publishing access → GitHub Actions → Add Trusted Publisher
#     - Organization or user: real-a11y
#     - Repository:           real-a11y-dev
#     - Workflow filename:    publish.yml
#     - Environment name:     (blank)
#
# Provenance attestations land in the public Sigstore transparency log and
# show as a verified badge on the package page.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish under (e.g. `beta`, `latest`)"
        required: false
        default: "beta"
  push:
    tags:
      - "v*"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for OIDC: lets npm validate the GitHub Actions identity
      # against each package's Trusted Publisher config, and lets npm
      # publish attach a provenance attestation.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from `packageManager` in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter='./packages/*' build

      - name: Resolve dist-tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="beta"; fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      # pnpm's `publish -r` publishes every package whose version/tag is new,
      # skips the rest. `--no-git-checks` lets tag-triggered runs proceed even
      # when the working tree does not match main exactly. No auth env vars
      # — OIDC handles authentication via the Trusted Publisher config above.
      - name: Publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          pnpm publish -r \
            --access public \
            --tag ${{ steps.tag.outputs.value }} \
            --no-git-checks
