name: Deploy docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Per-ref concurrency: each branch / PR gets its own group, so PR runs and
# main runs no longer cancel each other. Within a single ref the lock still
# holds — a new push supersedes any in-flight run on the same branch.
# (The previous repo-wide `pages` group was killing every concurrent PR
# build whenever any sibling PR or main push triggered this workflow.)
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # pnpm version is read from `packageManager` in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build all packages first so workspace:* deps resolve
      - run: pnpm -r --filter='./packages/*' build

      # Build the docs site
      - run: pnpm --filter @real-a11y-dev/website build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
