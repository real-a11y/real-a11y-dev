<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>debugger-native spike fixture</title>
  </head>
  <body>
    <main>
      <h1>Debugger native spike</h1>
      <p>
        The service worker must see the UA-shadow media controls below —
        invisible to the extension's content script — and complete the counter
        task through the tree.
      </p>

      <video controls aria-label="Product tour" width="320">
        <source src="missing.mp4" type="video/mp4" />
        Sorry, your browser doesn't support embedded videos.
      </video>

      <button id="add" type="button">Add item</button>
      <p id="status" role="status" aria-label="Cart status">Cart: 0 items</p>
    </main>
    <script>
      let count = 0;
      document.getElementById("add").addEventListener("click", () => {
        count += 1;
        const status = document.getElementById("status");
        status.textContent = "Cart: " + count + " items";
        status.setAttribute("aria-label", "Cart status: " + count);
      });
    </script>
  </body>
</html>
