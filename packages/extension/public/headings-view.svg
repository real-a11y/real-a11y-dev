<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 300" role="img" aria-label="Headings view: only the heading elements from the page shown as indigo colored bars indented by heading level, forming the document outline.">
  <title>Headings View — Document outline</title>

  <!-- Background -->
  <rect width="540" height="300" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="270" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">Headings View</text>

  <!-- H1: "Build accessible products" — full width, from main -->
  <rect x="20" y="46" width="500" height="30" rx="5" fill="#6366f1"/>
  <rect x="20" y="46" width="5" height="30" rx="2" fill="#4338ca"/>
  <rect x="34" y="52" width="28" height="18" rx="4" fill="rgba(255,255,255,0.25)"/>
  <text x="48" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">H1</text>
  <rect x="72" y="56" width="240" height="10" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- H2: "Our services" — indented -->
  <rect x="44" y="86" width="476" height="26" rx="5" fill="#6366f1" fill-opacity="0.8"/>
  <rect x="44" y="86" width="5" height="26" rx="2" fill="#4338ca"/>
  <rect x="58" y="91" width="28" height="16" rx="4" fill="rgba(255,255,255,0.25)"/>
  <text x="72" y="103" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">H2</text>
  <rect x="96" y="95" width="160" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- H3: "Accessibility audits" — more indented -->
  <rect x="68" y="120" width="452" height="22" rx="5" fill="#6366f1" fill-opacity="0.6"/>
  <rect x="68" y="120" width="4" height="22" rx="2" fill="#818cf8"/>
  <rect x="80" y="124" width="26" height="14" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="93" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">H3</text>
  <rect x="114" y="128" width="120" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- H3: "Training" -->
  <rect x="68" y="148" width="452" height="22" rx="5" fill="#6366f1" fill-opacity="0.6"/>
  <rect x="68" y="148" width="4" height="22" rx="2" fill="#818cf8"/>
  <rect x="80" y="152" width="26" height="14" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="93" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">H3</text>
  <rect x="114" y="156" width="80" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- H2: "Get started" — back to level 2 -->
  <rect x="44" y="180" width="476" height="26" rx="5" fill="#6366f1" fill-opacity="0.8"/>
  <rect x="44" y="180" width="5" height="26" rx="2" fill="#4338ca"/>
  <rect x="58" y="185" width="28" height="16" rx="4" fill="rgba(255,255,255,0.25)"/>
  <text x="72" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">H2</text>
  <rect x="96" y="189" width="120" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- H2: "Resources" (from aside) -->
  <rect x="44" y="214" width="476" height="26" rx="5" fill="#6366f1" fill-opacity="0.8"/>
  <rect x="44" y="214" width="5" height="26" rx="2" fill="#4338ca"/>
  <rect x="58" y="219" width="28" height="16" rx="4" fill="rgba(255,255,255,0.25)"/>
  <text x="72" y="231" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">H2</text>
  <rect x="96" y="223" width="110" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- H2: "Latest posts" (from aside) -->
  <rect x="44" y="248" width="476" height="26" rx="5" fill="#6366f1" fill-opacity="0.8"/>
  <rect x="44" y="248" width="5" height="26" rx="2" fill="#4338ca"/>
  <rect x="58" y="253" width="28" height="16" rx="4" fill="rgba(255,255,255,0.25)"/>
  <text x="72" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">H2</text>
  <rect x="96" y="257" width="100" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Legend -->
  <text x="270" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Screen readers navigate by headings — this is their table of contents.</text>
</svg>
