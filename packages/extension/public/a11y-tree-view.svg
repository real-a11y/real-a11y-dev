<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 580" role="img" aria-label="Accessibility tree as an indented list using the same colored shapes from the visual view, showing how assistive technology reads the page content in document order.">
  <title>A11y Tree View — Same shapes, read as a tree</title>

  <!-- Background -->
  <rect width="540" height="580" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="270" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">A11y Tree View</text>

  <!-- Guide line L0 -->
  <line x1="36" y1="70" x2="36" y2="538" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- document (root) -->
  <rect x="20" y="42" width="500" height="26" rx="5" fill="#1e293b"/>
  <text x="36" y="59" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">document</text>

  <!-- ===== banner (Header blue) ===== -->
  <line x1="36" y1="82" x2="48" y2="82" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="48" y="74" width="472" height="26" rx="5" fill="#2563eb"/>
  <text x="64" y="91" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">banner</text>

  <!-- ===== navigation (Teal) ===== -->
  <line x1="36" y1="114" x2="48" y2="114" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="48" y="106" width="472" height="26" rx="5" fill="#0d9488"/>
  <text x="64" y="123" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">navigation</text>

  <!-- Nav children guide -->
  <line x1="68" y1="132" x2="68" y2="256" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Nav links (sky) -->
  <line x1="68" y1="146" x2="80" y2="146" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="138" width="220" height="20" rx="4" fill="#0ea5e9"/>
  <text x="94" y="152" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">link</text>

  <line x1="68" y1="168" x2="80" y2="168" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="162" width="220" height="20" rx="4" fill="#0ea5e9"/>
  <text x="94" y="176" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">link</text>

  <line x1="68" y1="192" x2="80" y2="192" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="186" width="220" height="20" rx="4" fill="#0ea5e9"/>
  <text x="94" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">link</text>

  <line x1="68" y1="216" x2="80" y2="216" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="210" width="220" height="20" rx="4" fill="#0ea5e9"/>
  <text x="94" y="224" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">link</text>

  <line x1="68" y1="240" x2="80" y2="240" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="234" width="220" height="20" rx="4" fill="#0ea5e9"/>
  <text x="94" y="248" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">link</text>

  <!-- ===== main (Purple) ===== -->
  <line x1="36" y1="272" x2="48" y2="272" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="48" y="264" width="472" height="26" rx="5" fill="#7c3aed"/>
  <text x="64" y="281" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">main</text>

  <!-- Main children guide -->
  <line x1="68" y1="290" x2="68" y2="488" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- heading h1 (indigo) -->
  <line x1="68" y1="304" x2="80" y2="304" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="296" width="300" height="20" rx="4" fill="#6366f1"/>
  <text x="94" y="310" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">heading</text>

  <!-- paragraph (gray) -->
  <line x1="68" y1="326" x2="80" y2="326" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="320" width="380" height="16" rx="3" fill="#94a3b8"/>
  <text x="94" y="332" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">paragraph</text>

  <!-- heading h2 (indigo) -->
  <line x1="68" y1="348" x2="80" y2="348" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="342" width="220" height="18" rx="4" fill="#6366f1"/>
  <text x="94" y="355" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">heading</text>

  <!-- image (orange) -->
  <line x1="68" y1="372" x2="80" y2="372" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="364" width="380" height="24" rx="4" fill="#f97316"/>
  <text x="94" y="380" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">image</text>

  <!-- paragraph (gray) -->
  <line x1="68" y1="400" x2="80" y2="400" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="394" width="340" height="16" rx="3" fill="#94a3b8"/>
  <text x="94" y="406" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">paragraph</text>

  <!-- heading h2 (indigo) -->
  <line x1="68" y1="422" x2="80" y2="422" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="416" width="180" height="18" rx="4" fill="#6366f1"/>
  <text x="94" y="429" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">heading</text>

  <!-- inputs (rose) -->
  <line x1="68" y1="446" x2="80" y2="446" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="440" width="260" height="18" rx="4" fill="#f43f5e"/>
  <text x="94" y="453" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">input</text>

  <line x1="68" y1="466" x2="80" y2="466" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="462" width="260" height="18" rx="4" fill="#f43f5e"/>
  <text x="94" y="475" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">input</text>

  <!-- button (green) -->
  <line x1="68" y1="490" x2="80" y2="490" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="80" y="484" width="100" height="20" rx="4" fill="#10b981"/>
  <text x="94" y="498" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">button</text>

  <!-- ===== complementary (Amber) ===== -->
  <line x1="36" y1="518" x2="48" y2="518" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="48" y="510" width="472" height="26" rx="5" fill="#d97706"/>
  <text x="64" y="527" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">complementary</text>

  <!-- ===== contentinfo (Slate) ===== -->
  <line x1="36" y1="550" x2="48" y2="550" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="48" y="542" width="472" height="26" rx="5" fill="#475569"/>
  <text x="64" y="559" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">contentinfo</text>
</svg>
