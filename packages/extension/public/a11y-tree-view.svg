<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" role="img" aria-label="Accessibility tree view: the same website sections from the visual layout, rearranged as an indented tree showing how assistive technology reads them in document order.">
  <title>A11y Tree View — Same content, read as a tree</title>

  <!-- Background -->
  <rect width="520" height="440" rx="12" fill="#f8f7fc" stroke="#d8d0eb" stroke-width="1.5"/>

  <!-- Title -->
  <text x="260" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#4c1d95">A11y Tree View</text>

  <!-- document (root) -->
  <rect x="24" y="48" width="472" height="28" rx="5" fill="#ede9f6" stroke="#d8d0eb" stroke-width="1"/>
  <text x="40" y="67" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#4c1d95">document</text>

  <!-- Indent guide lines -->
  <line x1="44" y1="76" x2="44" y2="400" stroke="#d8d0eb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- banner (Header) -->
  <line x1="44" y1="92" x2="56" y2="92" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="56" y="82" width="420" height="28" rx="5" fill="#6d28d9"/>
  <text x="72" y="101" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">banner</text>
  <text x="130" y="101" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Header</text>
  <!-- Nav link placeholders inside header -->
  <rect x="300" y="88" width="32" height="16" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="338" y="88" width="32" height="16" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="376" y="88" width="32" height="16" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="414" y="88" width="48" height="16" rx="3" fill="rgba(255,255,255,0.2)"/>

  <!-- navigation (Nav) -->
  <line x1="44" y1="128" x2="56" y2="128" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="56" y="118" width="420" height="28" rx="5" fill="#8b5cf6"/>
  <text x="72" y="137" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">navigation</text>
  <text x="155" y="137" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Nav</text>

  <!-- Nested indent for nav children -->
  <line x1="76" y1="146" x2="76" y2="226" stroke="#d8d0eb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Nav links as small rectangles -->
  <line x1="76" y1="160" x2="88" y2="160" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="88" y="152" width="180" height="18" rx="3" fill="rgba(139,92,246,0.25)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="100" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6">link</text>

  <line x1="76" y1="180" x2="88" y2="180" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="88" y="174" width="180" height="18" rx="3" fill="rgba(139,92,246,0.25)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="100" y="187" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6">link</text>

  <line x1="76" y1="200" x2="88" y2="200" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="88" y="196" width="180" height="18" rx="3" fill="rgba(139,92,246,0.25)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="100" y="209" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6">link</text>

  <line x1="76" y1="220" x2="88" y2="220" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="88" y="216" width="180" height="18" rx="3" fill="rgba(139,92,246,0.25)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="100" y="229" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6">link</text>

  <!-- main (Main Content) -->
  <line x1="44" y1="252" x2="56" y2="252" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="56" y="242" width="420" height="28" rx="5" fill="#a78bfa"/>
  <text x="72" y="261" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">main</text>
  <text x="110" y="261" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Main Content</text>

  <!-- Nested indent for main children -->
  <line x1="76" y1="270" x2="76" y2="352" stroke="#d8d0eb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Main children: heading, text lines, button -->
  <line x1="76" y1="284" x2="88" y2="284" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="88" y="278" width="260" height="18" rx="3" fill="rgba(167,139,250,0.3)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="100" y="291" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6">heading</text>

  <line x1="76" y1="304" x2="88" y2="304" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="88" y="300" width="340" height="18" rx="3" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="100" y="313" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6">paragraph</text>

  <line x1="76" y1="326" x2="88" y2="326" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="88" y="320" width="80" height="22" rx="4" fill="rgba(167,139,250,0.35)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="100" y="335" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6">button</text>

  <!-- complementary (Aside) -->
  <line x1="44" y1="360" x2="56" y2="360" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="56" y="350" width="420" height="28" rx="5" fill="#c4b5fd"/>
  <text x="72" y="369" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#4c1d95">complementary</text>
  <text x="186" y="369" font-family="system-ui, sans-serif" font-size="11" fill="rgba(76,29,149,0.6)">Aside</text>

  <!-- contentinfo (Footer) -->
  <line x1="44" y1="396" x2="56" y2="396" stroke="#d8d0eb" stroke-width="1"/>
  <rect x="56" y="386" width="420" height="28" rx="5" fill="#7c3aed"/>
  <text x="72" y="405" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">contentinfo</text>
  <text x="165" y="405" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Footer</text>
</svg>
