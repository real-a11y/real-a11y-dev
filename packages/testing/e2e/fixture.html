<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Real A11y — E2E test fixture</title>
  </head>
  <body>
    <header>
      <nav aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/about">About</a>
      </nav>
    </header>

    <main>
      <h1>Test fixture</h1>

      <section aria-labelledby="form-heading">
        <h2 id="form-heading">Contact form</h2>
        <form aria-label="Contact form">
          <label>
            Full name
            <input type="text" id="name" />
          </label>
          <label>
            Email address
            <input type="email" id="email" />
          </label>
          <button type="submit">Send message</button>
          <button type="button" aria-label="Cancel and go back">Cancel</button>
        </form>
      </section>

      <section aria-labelledby="nav-heading">
        <h2 id="nav-heading">Navigation links</h2>
        <ul>
          <li><a href="/docs">Documentation</a></li>
          <li><a href="/examples">Examples</a></li>
        </ul>
      </section>

      <!-- A labeled dialog (hidden by default) -->
      <dialog id="confirm-dialog" aria-labelledby="dialog-title">
        <h2 id="dialog-title">Confirm action</h2>
        <p>Are you sure you want to proceed?</p>
        <button type="button">Confirm</button>
        <button type="button" aria-label="Close dialog">✕</button>
      </dialog>

      <!-- Button to open the dialog for testing -->
      <button type="button" id="open-dialog">Open dialog</button>
    </main>

    <footer>
      <p>© 2024 Real A11y</p>
    </footer>

    <script>
      document.getElementById("open-dialog").addEventListener("click", () => {
        document.getElementById("confirm-dialog").showModal();
      });
    </script>
  </body>
</html>
