<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" role="img" aria-label="Visual view: a realistic website layout as sighted users see it, with distinct colors for each element type — blue header, teal navigation, purple main content, amber aside, and slate footer.">
  <title>Visual View — How sighted users see the page</title>

  <!-- Background -->
  <rect width="640" height="500" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">Visual View</text>

  <!-- Browser chrome -->
  <rect x="20" y="42" width="600" height="22" rx="6" fill="#f1f5f9"/>
  <circle cx="34" cy="53" r="4" fill="#cbd5e1"/>
  <circle cx="48" cy="53" r="4" fill="#cbd5e1"/>
  <circle cx="62" cy="53" r="4" fill="#cbd5e1"/>
  <rect x="80" y="47" width="180" height="12" rx="3" fill="#e2e8f0"/>

  <!-- Page area -->
  <rect x="20" y="64" width="600" height="420" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===== HEADER (blue #2563eb) ===== -->
  <rect x="28" y="72" width="584" height="44" rx="6" fill="#2563eb"/>
  <text x="48" y="99" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Header</text>

  <!-- ===== THREE COLUMN LAYOUT ===== -->

  <!-- NAV sidebar (teal #0d9488) -->
  <rect x="28" y="124" width="120" height="296" rx="6" fill="#0d9488"/>
  <text x="88" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Nav</text>
  <!-- Nav links (sky #0ea5e9) -->
  <rect x="40" y="160" width="96" height="16" rx="3" fill="#0ea5e9"/>
  <rect x="40" y="182" width="96" height="16" rx="3" fill="#0ea5e9"/>
  <rect x="40" y="204" width="96" height="16" rx="3" fill="#0ea5e9"/>
  <rect x="40" y="226" width="96" height="16" rx="3" fill="#0ea5e9"/>
  <rect x="40" y="248" width="96" height="16" rx="3" fill="#0ea5e9"/>

  <!-- MAIN content (purple #7c3aed) -->
  <rect x="156" y="124" width="300" height="296" rx="6" fill="#7c3aed"/>
  <text x="170" y="148" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Main Content</text>
  <!-- Heading h1 (indigo #6366f1) -->
  <rect x="170" y="158" width="220" height="18" rx="3" fill="#6366f1"/>
  <!-- Paragraph (gray #94a3b8) -->
  <rect x="170" y="184" width="270" height="10" rx="2" fill="#94a3b8"/>
  <rect x="170" y="198" width="230" height="10" rx="2" fill="#94a3b8"/>
  <!-- Heading h2 (indigo) -->
  <rect x="170" y="218" width="160" height="14" rx="3" fill="#6366f1"/>
  <!-- Image (orange #f97316) -->
  <rect x="170" y="240" width="270" height="50" rx="4" fill="#f97316"/>
  <!-- Paragraph -->
  <rect x="170" y="298" width="270" height="10" rx="2" fill="#94a3b8"/>
  <rect x="170" y="312" width="200" height="10" rx="2" fill="#94a3b8"/>
  <!-- Heading h2 (indigo) -->
  <rect x="170" y="332" width="130" height="14" rx="3" fill="#6366f1"/>
  <!-- Inputs (rose #f43f5e) -->
  <rect x="170" y="354" width="200" height="16" rx="3" fill="#f43f5e"/>
  <rect x="170" y="374" width="200" height="16" rx="3" fill="#f43f5e"/>
  <!-- Button (green #10b981) -->
  <rect x="170" y="396" width="80" height="20" rx="4" fill="#10b981"/>

  <!-- ASIDE (amber #d97706) -->
  <rect x="464" y="124" width="148" height="296" rx="6" fill="#d97706"/>
  <text x="538" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Aside</text>
  <!-- Heading h2 (indigo) -->
  <rect x="476" y="158" width="120" height="14" rx="3" fill="#6366f1"/>
  <!-- Links (sky) -->
  <rect x="476" y="180" width="120" height="14" rx="3" fill="#0ea5e9"/>
  <rect x="476" y="200" width="120" height="14" rx="3" fill="#0ea5e9"/>
  <!-- Image (orange) -->
  <rect x="476" y="224" width="120" height="60" rx="4" fill="#f97316"/>
  <!-- Heading h2 (indigo) -->
  <rect x="476" y="296" width="100" height="14" rx="3" fill="#6366f1"/>
  <!-- Paragraph -->
  <rect x="476" y="318" width="120" height="8" rx="2" fill="#94a3b8"/>
  <rect x="476" y="330" width="100" height="8" rx="2" fill="#94a3b8"/>

  <!-- ===== FOOTER (slate #475569) ===== -->
  <rect x="28" y="428" width="584" height="36" rx="6" fill="#475569"/>
  <text x="48" y="451" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Footer</text>
  <!-- Paragraph (gray) -->
  <rect x="110" y="442" width="100" height="10" rx="2" fill="#94a3b8"/>
  <!-- Links (sky) -->
  <rect x="440" y="440" width="50" height="14" rx="3" fill="#0ea5e9"/>
  <rect x="498" y="440" width="50" height="14" rx="3" fill="#0ea5e9"/>
  <rect x="556" y="440" width="50" height="14" rx="3" fill="#0ea5e9"/>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(20, 488)">
    <rect x="0" y="0" width="10" height="6" rx="1" fill="#6366f1"/>
    <text x="14" y="6" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">heading</text>
    <rect x="62" y="0" width="10" height="6" rx="1" fill="#94a3b8"/>
    <text x="76" y="6" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">text</text>
    <rect x="104" y="0" width="10" height="6" rx="1" fill="#0ea5e9"/>
    <text x="118" y="6" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">link</text>
    <rect x="144" y="0" width="10" height="6" rx="1" fill="#f97316"/>
    <text x="158" y="6" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">image</text>
    <rect x="194" y="0" width="10" height="6" rx="1" fill="#f43f5e"/>
    <text x="208" y="6" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">input</text>
    <rect x="242" y="0" width="10" height="6" rx="1" fill="#10b981"/>
    <text x="256" y="6" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">button</text>
  </g>
</svg>
