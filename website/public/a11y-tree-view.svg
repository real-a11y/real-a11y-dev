<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" role="img" aria-label="Accessibility tree view: the same website content rearranged as a hierarchical tree diagram, using the same colors per element type as the visual view.">
  <title>A11y Tree View — How assistive technology structures the page</title>

  <!-- Background -->
  <rect width="640" height="500" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">A11y Tree View</text>

  <!-- Root: document -->
  <rect x="260" y="44" width="120" height="28" rx="6" fill="#1e293b"/>
  <text x="320" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">document</text>

  <!-- Connector from document down -->
  <line x1="320" y1="72" x2="320" y2="86" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Horizontal bar to L1 children -->
  <line x1="80" y1="86" x2="560" y2="86" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- L1: banner (Header blue) -->
  <line x1="80" y1="86" x2="80" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="28" y="96" width="104" height="26" rx="5" fill="#2563eb"/>
  <text x="80" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">banner</text>

  <!-- L1: navigation (Teal) — no children shown at this level -->
  <line x1="210" y1="86" x2="210" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="154" y="96" width="112" height="26" rx="5" fill="#0d9488"/>
  <text x="210" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">navigation</text>

  <!-- L1: main (Purple) -->
  <line x1="370" y1="86" x2="370" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="330" y="96" width="80" height="26" rx="5" fill="#7c3aed"/>
  <text x="370" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">main</text>

  <!-- L1: complementary (Amber) -->
  <line x1="480" y1="86" x2="480" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="424" y="96" width="112" height="26" rx="5" fill="#d97706"/>
  <text x="480" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">complementary</text>

  <!-- L1: contentinfo (Slate) -->
  <line x1="560" y1="86" x2="560" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="508" y="96" width="104" height="26" rx="5" fill="#475569"/>
  <text x="560" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">contentinfo</text>

  <!-- ===== L2: navigation children ===== -->
  <line x1="210" y1="122" x2="210" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="150" y1="140" x2="270" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <line x1="150" y1="140" x2="150" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="112" y="148" width="76" height="22" rx="4" fill="#0ea5e9"/>
  <text x="150" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="210" y1="140" x2="210" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="172" y="148" width="76" height="22" rx="4" fill="#0ea5e9"/>
  <text x="210" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="270" y1="140" x2="270" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="232" y="148" width="76" height="22" rx="4" fill="#0ea5e9"/>
  <text x="270" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- More nav links below -->
  <line x1="150" y1="170" x2="150" y2="178" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="112" y="178" width="76" height="22" rx="4" fill="#0ea5e9"/>
  <text x="150" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="210" y1="170" x2="210" y2="178" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="172" y="178" width="76" height="22" rx="4" fill="#0ea5e9"/>
  <text x="210" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- ===== L2: main children ===== -->
  <line x1="370" y1="122" x2="370" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="310" y1="140" x2="430" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- heading h1 -->
  <line x1="310" y1="140" x2="310" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="276" y="148" width="68" height="22" rx="4" fill="#6366f1"/>
  <text x="310" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <!-- paragraph -->
  <line x1="350" y1="140" x2="350" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="316" y="178" width="68" height="22" rx="4" fill="#94a3b8"/>
  <text x="350" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">paragraph</text>

  <!-- heading h2 -->
  <line x1="370" y1="140" x2="370" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="346" y="148" width="68" height="22" rx="4" fill="#6366f1"/>
  <text x="380" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <!-- image -->
  <line x1="390" y1="140" x2="390" y2="178" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="356" y="208" width="68" height="22" rx="4" fill="#f97316"/>
  <text x="390" y="223" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">image</text>

  <!-- heading h2 -->
  <line x1="430" y1="140" x2="430" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="396" y="148" width="68" height="22" rx="4" fill="#6366f1"/>
  <text x="430" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <!-- L3: form children under main -->
  <line x1="430" y1="170" x2="430" y2="186" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="390" y1="186" x2="470" y2="186" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- inputs -->
  <line x1="390" y1="186" x2="390" y2="238" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="370" y="238" width="60" height="22" rx="4" fill="#f43f5e"/>
  <text x="400" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">input</text>

  <line x1="430" y1="186" x2="430" y2="238" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="410" y="268" width="60" height="22" rx="4" fill="#f43f5e"/>
  <text x="440" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">input</text>

  <!-- button -->
  <line x1="470" y1="186" x2="470" y2="238" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="440" y="238" width="60" height="22" rx="4" fill="#10b981"/>
  <text x="470" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">button</text>

  <!-- ===== L2: complementary children ===== -->
  <line x1="480" y1="122" x2="480" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="460" y1="140" x2="530" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <line x1="460" y1="140" x2="460" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="430" y="148" width="60" height="22" rx="4" fill="#6366f1"/>
  <text x="460" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <line x1="490" y1="140" x2="490" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="460" y="178" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="490" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="530" y1="140" x2="530" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="500" y="148" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="530" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- image in aside -->
  <rect x="500" y="178" width="60" height="22" rx="4" fill="#f97316"/>
  <text x="530" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">image</text>

  <!-- ===== L2: contentinfo children ===== -->
  <line x1="560" y1="122" x2="560" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="536" y1="140" x2="590" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <line x1="536" y1="140" x2="536" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="506" y="148" width="60" height="22" rx="4" fill="#94a3b8"/>
  <text x="536" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">paragraph</text>

  <line x1="560" y1="140" x2="560" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="530" y="178" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="560" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="590" y1="140" x2="590" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="560" y="148" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="590" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="320" width="600" height="56" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Same content, different structure</text>
  <text x="320" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Sighted users see a 2D layout. Assistive technology reads a hierarchical tree.</text>
  <text x="320" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Both must represent the same meaning.</text>

  <!-- Color legend -->
  <g transform="translate(20, 488)">
    <rect x="0" y="-8" width="600" height="16" rx="4" fill="none"/>
    <rect x="0" y="-4" width="14" height="8" rx="2" fill="#2563eb"/>
    <text x="18" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">header</text>
    <rect x="58" y="-4" width="14" height="8" rx="2" fill="#0d9488"/>
    <text x="76" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">nav</text>
    <rect x="102" y="-4" width="14" height="8" rx="2" fill="#7c3aed"/>
    <text x="120" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">main</text>
    <rect x="152" y="-4" width="14" height="8" rx="2" fill="#d97706"/>
    <text x="170" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">aside</text>
    <rect x="204" y="-4" width="14" height="8" rx="2" fill="#475569"/>
    <text x="222" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">footer</text>
    <text x="270" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#cbd5e1">|</text>
    <rect x="284" y="-4" width="14" height="8" rx="2" fill="#6366f1"/>
    <text x="302" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">heading</text>
    <rect x="346" y="-4" width="14" height="8" rx="2" fill="#94a3b8"/>
    <text x="364" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">text</text>
    <rect x="390" y="-4" width="14" height="8" rx="2" fill="#0ea5e9"/>
    <text x="408" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">link</text>
    <rect x="434" y="-4" width="14" height="8" rx="2" fill="#f97316"/>
    <text x="452" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">image</text>
    <rect x="488" y="-4" width="14" height="8" rx="2" fill="#f43f5e"/>
    <text x="506" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">input</text>
    <rect x="536" y="-4" width="14" height="8" rx="2" fill="#10b981"/>
    <text x="554" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">button</text>
  </g>
</svg>
