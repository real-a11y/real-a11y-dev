<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="Accessibility tree view: the same website content rearranged as a hierarchical tree diagram, using the same colors per element type as the visual view.">
  <title>A11y Tree View — How assistive technology structures the page</title>

  <!-- Background -->
  <rect width="880" height="420" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">A11y Tree View</text>

  <!-- Root: document -->
  <rect x="380" y="44" width="120" height="28" rx="6" fill="#1e293b"/>
  <text x="440" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">document</text>

  <!-- Connector from document down -->
  <line x1="440" y1="72" x2="440" y2="86" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Horizontal bar to L1 children -->
  <line x1="80" y1="86" x2="800" y2="86" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- L1: banner (Header blue) -->
  <line x1="80" y1="86" x2="80" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="25" y="96" width="110" height="26" rx="5" fill="#2563eb"/>
  <text x="80" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">banner</text>

  <!-- L1: navigation (Teal) -->
  <line x1="250" y1="86" x2="250" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="190" y="96" width="120" height="26" rx="5" fill="#0d9488"/>
  <text x="250" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">navigation</text>

  <!-- L1: main (Purple) -->
  <line x1="440" y1="86" x2="440" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="395" y="96" width="90" height="26" rx="5" fill="#7c3aed"/>
  <text x="440" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">main</text>

  <!-- L1: complementary (Amber) -->
  <line x1="630" y1="86" x2="630" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="562" y="96" width="136" height="26" rx="5" fill="#d97706"/>
  <text x="630" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">complementary</text>

  <!-- L1: contentinfo (Slate) -->
  <line x1="800" y1="86" x2="800" y2="96" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="742" y="96" width="116" height="26" rx="5" fill="#475569"/>
  <text x="800" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">contentinfo</text>

  <!-- ===== L2: navigation children ===== -->
  <line x1="250" y1="122" x2="250" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="185" y1="140" x2="315" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <line x1="185" y1="140" x2="185" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="157" y="148" width="56" height="22" rx="4" fill="#0ea5e9"/>
  <text x="185" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="250" y1="140" x2="250" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="222" y="148" width="56" height="22" rx="4" fill="#0ea5e9"/>
  <text x="250" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="315" y1="140" x2="315" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="287" y="148" width="56" height="22" rx="4" fill="#0ea5e9"/>
  <text x="315" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- More nav links below -->
  <line x1="215" y1="170" x2="215" y2="182" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="187" y="182" width="56" height="22" rx="4" fill="#0ea5e9"/>
  <text x="215" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="285" y1="170" x2="285" y2="182" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="257" y="182" width="56" height="22" rx="4" fill="#0ea5e9"/>
  <text x="285" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- ===== L2: main children ===== -->
  <line x1="440" y1="122" x2="440" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="370" y1="140" x2="510" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- heading h1 -->
  <line x1="370" y1="140" x2="370" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="336" y="148" width="68" height="22" rx="4" fill="#6366f1"/>
  <text x="370" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <!-- heading h2 -->
  <line x1="440" y1="140" x2="440" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="406" y="148" width="68" height="22" rx="4" fill="#6366f1"/>
  <text x="440" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <!-- heading h2 -->
  <line x1="510" y1="140" x2="510" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="476" y="148" width="68" height="22" rx="4" fill="#6366f1"/>
  <text x="510" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <!-- paragraph under heading h1 -->
  <line x1="370" y1="170" x2="370" y2="182" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="336" y="182" width="68" height="22" rx="4" fill="#94a3b8"/>
  <text x="370" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">paragraph</text>

  <!-- image under paragraph -->
  <line x1="370" y1="204" x2="370" y2="216" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="340" y="216" width="60" height="22" rx="4" fill="#f97316"/>
  <text x="370" y="231" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">image</text>

  <!-- L3: form children under heading h2 at 510 -->
  <line x1="510" y1="170" x2="510" y2="186" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="475" y1="186" x2="545" y2="186" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- input -->
  <line x1="475" y1="186" x2="475" y2="216" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="445" y="216" width="60" height="22" rx="4" fill="#f43f5e"/>
  <text x="475" y="231" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">input</text>

  <!-- button -->
  <line x1="545" y1="186" x2="545" y2="216" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="515" y="216" width="60" height="22" rx="4" fill="#10b981"/>
  <text x="545" y="231" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">button</text>

  <!-- input (second) -->
  <line x1="510" y1="238" x2="510" y2="250" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="480" y="250" width="60" height="22" rx="4" fill="#f43f5e"/>
  <text x="510" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">input</text>

  <!-- ===== L2: complementary children ===== -->
  <line x1="630" y1="122" x2="630" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="590" y1="140" x2="670" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <line x1="590" y1="140" x2="590" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="556" y="148" width="68" height="22" rx="4" fill="#6366f1"/>
  <text x="590" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">heading</text>

  <line x1="630" y1="140" x2="630" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="600" y="148" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="630" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="670" y1="140" x2="670" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="640" y="148" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="670" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- image in aside -->
  <line x1="630" y1="170" x2="630" y2="182" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="600" y="182" width="60" height="22" rx="4" fill="#f97316"/>
  <text x="630" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">image</text>

  <!-- ===== L2: contentinfo children ===== -->
  <line x1="800" y1="122" x2="800" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="760" y1="140" x2="840" y2="140" stroke="#cbd5e1" stroke-width="1.5"/>

  <line x1="760" y1="140" x2="760" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="726" y="148" width="68" height="22" rx="4" fill="#94a3b8"/>
  <text x="760" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">paragraph</text>

  <line x1="800" y1="140" x2="800" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="770" y="148" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="800" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <line x1="840" y1="140" x2="840" y2="148" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="810" y="148" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="840" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">link</text>

  <!-- ===== LEGEND ===== -->
  <rect x="100" y="300" width="680" height="56" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Same content, different structure</text>
  <text x="440" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Sighted users see a 2D layout. Assistive technology reads a hierarchical tree.</text>
  <text x="440" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Both must represent the same meaning.</text>

  <!-- Color legend -->
  <g transform="translate(140, 400)">
    <rect x="0" y="-4" width="14" height="8" rx="2" fill="#2563eb"/>
    <text x="18" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">header</text>
    <rect x="58" y="-4" width="14" height="8" rx="2" fill="#0d9488"/>
    <text x="76" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">nav</text>
    <rect x="102" y="-4" width="14" height="8" rx="2" fill="#7c3aed"/>
    <text x="120" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">main</text>
    <rect x="152" y="-4" width="14" height="8" rx="2" fill="#d97706"/>
    <text x="170" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">aside</text>
    <rect x="204" y="-4" width="14" height="8" rx="2" fill="#475569"/>
    <text x="222" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">footer</text>
    <text x="270" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#cbd5e1">|</text>
    <rect x="284" y="-4" width="14" height="8" rx="2" fill="#6366f1"/>
    <text x="302" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">heading</text>
    <rect x="346" y="-4" width="14" height="8" rx="2" fill="#94a3b8"/>
    <text x="364" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">text</text>
    <rect x="390" y="-4" width="14" height="8" rx="2" fill="#0ea5e9"/>
    <text x="408" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">link</text>
    <rect x="434" y="-4" width="14" height="8" rx="2" fill="#f97316"/>
    <text x="452" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">image</text>
    <rect x="488" y="-4" width="14" height="8" rx="2" fill="#f43f5e"/>
    <text x="506" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">input</text>
    <rect x="536" y="-4" width="14" height="8" rx="2" fill="#10b981"/>
    <text x="554" y="3" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">button</text>
  </g>
</svg>
