<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 440" role="img" aria-label="Tab order view: only the focusable elements from the page shown as numbered colored bars, using the same element colors as the visual view, in the order a keyboard user reaches them.">
  <title>Tab Order View — Keyboard navigation path</title>

  <!-- Background -->
  <rect width="540" height="440" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="270" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">Tab Order View</text>

  <!-- Tab 1: link (from banner) — sky on blue bg hint -->
  <g transform="translate(20, 44)">
    <rect x="20" y="0" width="480" height="26" rx="5" fill="#0ea5e9"/>
    <circle cx="8" cy="13" r="12" fill="#0369a1" stroke="#f8fafc" stroke-width="2"/>
    <text x="8" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">1</text>
    <rect x="36" y="6" width="160" height="14" rx="3" fill="rgba(255,255,255,0.25)"/>
    <text x="46" y="17" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">link</text>
    <rect x="420" y="5" width="60" height="16" rx="3" fill="rgba(14,105,161,0.4)"/>
    <text x="450" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#ffffff">banner</text>
  </g>

  <!-- Tab 2: link (from banner) -->
