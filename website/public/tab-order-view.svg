<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" role="img" aria-label="Tab order view showing focusable elements as a numbered flat list in the order a keyboard user would reach them, with action badges like NAVIGATE, TYPE, and CLICK.">
  <title>Tab Order View — Keyboard navigation sequence</title>
  <style>
    .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
    .role { font-weight: 600; fill: #92400e; font-size: 13px; }
    .name { fill: #047857; font-size: 13px; }
    .badge-action { font-size: 9px; font-weight: 600; fill: #1e40af; letter-spacing: 0.5px; }
    .badge-state { font-size: 9px; font-weight: 600; fill: #c2410c; letter-spacing: 0.5px; }
    .tab-num { font-size: 11px; font-weight: 700; fill: hsl(221, 83%, 53%); }
  </style>

  <!-- Panel background -->
  <rect width="480" height="380" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect width="480" height="36" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <rect y="26" width="480" height="10" fill="#f9fafb"/>
  <text x="20" y="23" class="mono" font-size="12" font-weight="600" fill="#374151">Tab Order</text>
  <line x1="0" y1="36" x2="480" y2="36" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Tab key icon -->
  <rect x="396" y="8" width="64" height="20" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="428" y="22" text-anchor="middle" class="mono" font-size="10" fill="#6b7280">Tab ⇥</text>

  <!-- Row 1 -->
  <g transform="translate(0, 44)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">1</text>
    <text x="44" y="16" class="mono role">link</text>
    <text x="74" y="16" class="mono name">"Skip to main content"</text>
    <rect x="256" y="4" width="65" height="16" rx="3" fill="#dbeafe"/>
    <text x="288" y="15" text-anchor="middle" class="mono badge-action">NAVIGATE</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(0, 72)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">2</text>
    <text x="44" y="16" class="mono role">link</text>
    <text x="74" y="16" class="mono name">"Real A11y"</text>
    <rect x="170" y="4" width="65" height="16" rx="3" fill="#dbeafe"/>
    <text x="202" y="15" text-anchor="middle" class="mono badge-action">NAVIGATE</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(0, 100)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">3</text>
    <text x="44" y="16" class="mono role">link</text>
    <text x="74" y="16" class="mono name">"Services"</text>
    <rect x="164" y="4" width="65" height="16" rx="3" fill="#dbeafe"/>
    <text x="196" y="15" text-anchor="middle" class="mono badge-action">NAVIGATE</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(0, 128)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">4</text>
    <text x="44" y="16" class="mono role">link</text>
    <text x="74" y="16" class="mono name">"Blog"</text>
    <rect x="128" y="4" width="65" height="16" rx="3" fill="#dbeafe"/>
    <text x="160" y="15" text-anchor="middle" class="mono badge-action">NAVIGATE</text>
  </g>

  <!-- Row 5 -->
  <g transform="translate(0, 156)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">5</text>
    <text x="44" y="16" class="mono role">textbox</text>
    <text x="104" y="16" class="mono name">"Your name"</text>
    <rect x="204" y="4" width="56" height="16" rx="3" fill="#fff7ed"/>
    <text x="232" y="15" text-anchor="middle" class="mono badge-state">required</text>
    <rect x="266" y="4" width="36" height="16" rx="3" fill="#dbeafe"/>
    <text x="284" y="15" text-anchor="middle" class="mono badge-action">TYPE</text>
  </g>

  <!-- Row 6 -->
  <g transform="translate(0, 184)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">6</text>
    <text x="44" y="16" class="mono role">textbox</text>
    <text x="104" y="16" class="mono name">"Work email"</text>
    <rect x="210" y="4" width="56" height="16" rx="3" fill="#fff7ed"/>
    <text x="238" y="15" text-anchor="middle" class="mono badge-state">required</text>
    <rect x="272" y="4" width="36" height="16" rx="3" fill="#dbeafe"/>
    <text x="290" y="15" text-anchor="middle" class="mono badge-action">TYPE</text>
  </g>

  <!-- Row 7 -->
  <g transform="translate(0, 212)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">7</text>
    <text x="44" y="16" class="mono role">textbox</text>
    <text x="104" y="16" class="mono name">"Product URL"</text>
    <rect x="214" y="4" width="36" height="16" rx="3" fill="#dbeafe"/>
    <text x="232" y="15" text-anchor="middle" class="mono badge-action">TYPE</text>
  </g>

  <!-- Row 8 -->
  <g transform="translate(0, 240)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">8</text>
    <text x="44" y="16" class="mono role">textbox</text>
    <text x="104" y="16" class="mono name">"Tell me about your request"</text>
    <rect x="330" y="4" width="56" height="16" rx="3" fill="#fff7ed"/>
    <text x="358" y="15" text-anchor="middle" class="mono badge-state">required</text>
    <rect x="392" y="4" width="36" height="16" rx="3" fill="#dbeafe"/>
    <text x="410" y="15" text-anchor="middle" class="mono badge-action">TYPE</text>
  </g>

  <!-- Row 9 -->
  <g transform="translate(0, 268)">
    <rect x="16" y="2" width="20" height="18" rx="4" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="26" y="15" text-anchor="middle" class="mono tab-num">9</text>
    <text x="44" y="16" class="mono role">button</text>
    <text x="98" y="16" class="mono name">"Send message"</text>
    <rect x="216" y="4" width="40" height="16" rx="3" fill="#dbeafe"/>
    <text x="236" y="15" text-anchor="middle" class="mono badge-action">CLICK</text>
  </g>

  <!-- Separator -->
  <line x1="20" y1="298" x2="460" y2="298" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Legend -->
  <rect x="20" y="310" width="440" height="54" rx="6" fill="#f8f7fc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="240" y="330" text-anchor="middle" class="mono" font-size="11" font-weight="600" fill="#4c1d95">Tab sequence = keyboard user's navigation path</text>
  <text x="240" y="348" text-anchor="middle" class="mono" font-size="10" fill="#6b7280">Only focusable elements · Flat list · Must match visual order</text>
</svg>
