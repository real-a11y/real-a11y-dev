<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" role="img" aria-label="Headings structure view showing the document outline as an indented list of headings from H1 to H3, as seen when filtering by Headings in the Real A11y extension.">
  <title>Headings View — Document outline structure</title>
  <style>
    .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
    .role { font-weight: 600; fill: #92400e; font-size: 13px; }
    .name { fill: #047857; font-size: 13px; }
    .badge-level { font-size: 9px; font-weight: 700; fill: hsl(221, 83%, 53%); letter-spacing: 0.3px; }
  </style>

  <!-- Panel background -->
  <rect width="480" height="340" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect width="480" height="36" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <rect y="26" width="480" height="10" fill="#f9fafb"/>
  <text x="20" y="23" class="mono" font-size="12" font-weight="600" fill="#374151">Headings</text>
  <line x1="0" y1="36" x2="480" y2="36" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Filter chip -->
  <rect x="380" y="8" width="80" height="20" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="420" y="22" text-anchor="middle" class="mono" font-size="10" font-weight="600" fill="#1e40af">Headings</text>

  <!-- Row 1: heading H1 "Let's work together" -->
  <g transform="translate(0, 44)">
    <text x="20" y="16" class="mono role">heading</text>
    <rect x="78" y="4" width="22" height="16" rx="3" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="89" y="15" text-anchor="middle" class="mono badge-level">H1</text>
    <text x="108" y="16" class="mono name">"Let's work together"</text>
  </g>

  <!-- Row 2: heading H2 "Our services" -->
  <g transform="translate(0, 72)">
    <text x="40" y="16" class="mono role">heading</text>
    <rect x="98" y="4" width="22" height="16" rx="3" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="109" y="15" text-anchor="middle" class="mono badge-level">H2</text>
    <text x="128" y="16" class="mono name">"Our services"</text>
  </g>

  <!-- Row 3: heading H3 "Accessibility audits" -->
  <g transform="translate(0, 100)">
    <text x="60" y="16" class="mono role">heading</text>
    <rect x="118" y="4" width="22" height="16" rx="3" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="129" y="15" text-anchor="middle" class="mono badge-level">H3</text>
    <text x="148" y="16" class="mono name">"Accessibility audits"</text>
  </g>

  <!-- Row 4: heading H3 "Training" -->
  <g transform="translate(0, 128)">
    <text x="60" y="16" class="mono role">heading</text>
    <rect x="118" y="4" width="22" height="16" rx="3" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="129" y="15" text-anchor="middle" class="mono badge-level">H3</text>
    <text x="148" y="16" class="mono name">"Training"</text>
  </g>

  <!-- Row 5: heading H3 "Consulting" -->
  <g transform="translate(0, 156)">
    <text x="60" y="16" class="mono role">heading</text>
    <rect x="118" y="4" width="22" height="16" rx="3" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="129" y="15" text-anchor="middle" class="mono badge-level">H3</text>
    <text x="148" y="16" class="mono name">"Consulting"</text>
  </g>

  <!-- Row 6: heading H2 "About us" -->
  <g transform="translate(0, 184)">
    <text x="40" y="16" class="mono role">heading</text>
    <rect x="98" y="4" width="22" height="16" rx="3" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="109" y="15" text-anchor="middle" class="mono badge-level">H2</text>
    <text x="128" y="16" class="mono name">"About us"</text>
  </g>

  <!-- Row 7: heading H2 "Contact" -->
  <g transform="translate(0, 212)">
    <text x="40" y="16" class="mono role">heading</text>
    <rect x="98" y="4" width="22" height="16" rx="3" fill="hsla(221, 83%, 53%, 0.1)" stroke="hsla(221, 83%, 53%, 0.2)" stroke-width="1"/>
    <text x="109" y="15" text-anchor="middle" class="mono badge-level">H2</text>
    <text x="128" y="16" class="mono name">"Contact"</text>
  </g>

  <!-- Separator -->
  <line x1="20" y1="244" x2="460" y2="244" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Legend -->
  <rect x="20" y="256" width="440" height="68" rx="6" fill="#f8f7fc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="240" y="276" text-anchor="middle" class="mono" font-size="11" font-weight="600" fill="#4c1d95">Document outline = table of contents for AT</text>
  <text x="240" y="294" text-anchor="middle" class="mono" font-size="10" fill="#6b7280">Exactly one H1 · No skipped levels · Logical nesting</text>
  <text x="240" y="312" text-anchor="middle" class="mono" font-size="10" fill="#6b7280">Screen readers use headings as the primary way to navigate.</text>
</svg>
